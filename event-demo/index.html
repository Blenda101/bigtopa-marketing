<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigTopa Event Landing Pages - Wireframes & Mockups</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        /* BigTopa brand colors */
        :root {
            --bt-primary: #FF6B35;
            --bt-secondary: #F7931E;
            --bt-accent: #4ECDC4;
            --bt-dark: #1A1A2E;
            --bt-light: #F8F9FA;
        }
        
        .bt-primary { background-color: var(--bt-primary); }
        .bt-secondary { background-color: var(--bt-secondary); }
        .bt-accent { background-color: var(--bt-accent); }
        .bt-dark { background-color: var(--bt-dark); }
        
        .text-bt-primary { color: var(--bt-primary); }
        .text-bt-secondary { color: var(--bt-secondary); }
        .text-bt-accent { color: var(--bt-accent); }
        
        .border-bt-primary { border-color: var(--bt-primary); }
        
        /* Ticket card hover effect */
        .ticket-card {
            transition: all 0.3s ease;
        }
        
        .ticket-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        
        /* Tab styles */
        .tab-button {
            position: relative;
            padding-bottom: 8px;
        }
        
        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background-color: var(--bt-primary);
        }
        
        /* Status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .status-upcoming {
            background-color: #E3F2FD;
            color: #1976D2;
        }
        
        .status-live {
            background-color: #FFF3E0;
            color: #F57C00;
        }
        
        .status-ended {
            background-color: #F5F5F5;
            color: #757575;
        }
        
        /* Countdown timer */
        .countdown-unit {
            text-align: center;
            min-width: 60px;
        }
        
        .countdown-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            color: var(--bt-primary);
        }
        
        .countdown-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

        let currentView = 'public';
        
        function changeViewMode() {
            currentView = document.getElementById('viewMode').value;
            // Re-render current example with new view
            const currentExample = document.querySelector('[data-example].active');
            if (currentExample) {
                showExample(currentExample.dataset.example);
            }
        }
        
        function showExample(exampleType) {
            const container = document.getElementById('eventExamples');
            
            // Mark active example
            document.querySelectorAll('.example-btn').forEach(btn => {
                btn.classList.remove('border-bt-primary', 'bg-orange-50');
            });
            event.target.closest('.example-btn')?.classList.add('border-bt-primary', 'bg-orange-50');
            
            switch(exampleType) {
                case 'single-day':
                    container.innerHTML = renderSingleDayEvent();
                    break;
                case 'multi-day':
                    container.innerHTML = renderMultiDayEvent();
                    break;
                case 'conference':
                    container.innerHTML = renderConferenceEvent();
                    break;
                case 'hybrid':
                    container.innerHTML = renderHybridEvent();
                    break;
                default:
                    container.innerHTML = renderSingleDayEvent();
            }
            
            container.setAttribute('data-example', exampleType);
            container.classList.add('active', 'fade-in');
        }
