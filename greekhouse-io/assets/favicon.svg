  <!-- columns -->
  <rect x="15" y="35" width="4" height="14" rx="1" fill="#D4AF6A"/>
  <rect x="24.5" y="35" width="4" height="14" rx="1" fill="#D4AF6A"/>
  <rect x="34" y="35" width="4" height="14" rx="1" fill="#D4AF6A"/>
  <rect x="43.5" y="35" width="4" height="14" rx="1" fill="#D4AF6A"/>
  <!-- stylobate / base -->
  <rect x="11" y="50" width="42" height="3.6" rx="1" fill="#D4AF6A"/>
</svg>
