<svg width="330" height="64" viewBox="0 0 330 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GatherAgain">
  <!-- GatherAgain horizontal lockup — LIGHT backgrounds. For print/production, outline the wordmark glyphs. -->
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@700&display=swap');</style>
  <!-- Mark: gathering cluster on forest tile -->
  <rect width="64" height="64" rx="14" fill="#1A3128"/>
  <circle cx="32" cy="32" r="7" fill="#C4713A"/>
  <circle cx="47" cy="32" r="4" fill="#F7F2EC"/>
  <circle cx="39.5" cy="45" r="4" fill="#F7F2EC"/>
  <circle cx="24.5" cy="45" r="4" fill="#F7F2EC"/>
  <circle cx="17" cy="32" r="4" fill="#F7F2EC"/>
  <circle cx="24.5" cy="19" r="4" fill="#F7F2EC"/>
  <circle cx="39.5" cy="19" r="4" fill="#F7F2EC"/>
  <!-- Wordmark -->
  <text x="80" y="43" font-family="'Lora', Georgia, 'Times New Roman', serif" font-weight="700" font-size="36">
    <tspan fill="#1A3128">Gather</tspan><tspan fill="#C4713A">Again</tspan>
  </text>
</svg>
